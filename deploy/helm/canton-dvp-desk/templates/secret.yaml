{{- /*
Render a Secret holding the Ledger API JWT ONLY when an inline value is given
and no existing secret is referenced. If you set ledger.jwt.existingSecret, this
chart does not manage the secret — you create/manage it out-of-band (recommended
for real tokens). A no-auth sandbox needs neither.
*/ -}}
{{- if and .Values.ledger.jwt.value (not .Values.ledger.jwt.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "canton-dvp-desk.jwtSecretName" . }}
  labels:
    {{- include "canton-dvp-desk.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.ledger.jwt.jwtSecretKey }}: {{ .Values.ledger.jwt.value | quote }}
{{- end }}
