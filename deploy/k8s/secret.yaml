# Ledger API JWT bearer token. REQUIRED only for a real participant with auth;
# skip this file entirely (and the LEDGER_JWT env block in deployment.yaml) for a
# no-auth sandbox. Never commit a real token — prefer:
#   kubectl create secret generic canton-dvp-desk-jwt --from-literal=jwt='<token>'
apiVersion: v1
kind: Secret
metadata:
  name: canton-dvp-desk-jwt
  labels:
    app: canton-dvp-desk
type: Opaque
stringData:
  jwt: "REPLACE_WITH_LEDGER_API_JWT"
