# daml.yaml — DAML project manifest for the Canton DvP Settlement Desk.
# ---------------------------------------------------------------------------
# This is what the `daml` assistant reads to build, test, and run the project
# (the DAML equivalent of package.json / Cargo.toml).
#
# sdk-version — set to your installed SDK. After installing the DAML SDK, run:
#       daml version
#   and confirm `sdk-version` below matches it (this project is built on 2.9.4).
#   The build refuses to run if the pinned SDK is not installed.
#
#   For CANTON NETWORK DEVNET deployment the ledger runs a specific Splice / Daml
#   release — see DEPLOY.md. Build the DAR with the SDK line the Devnet onboarding
#   specifies; the DAML source here is written in the portable subset that compiles
#   on both the current 2.x LTS and the 3.x line.
# ---------------------------------------------------------------------------

sdk-version: 2.9.4                       # installed DAML SDK (from `daml version`)

name: canton-dvp-settlement-desk         # package name (appears in the DAR)
version: 1.0.0                           # package version (semver)
source: daml                             # directory holding the .daml sources

# All modules under `source: daml` are auto-discovered — no per-file listing:
#   Instrument.daml     — the tokenised-asset definition layer (InstrumentKey + Instrument).
#   Holding.daml        — the balance layer (issuer-signed, owner-observer; Transfer/Split/Merge).
#   Settlement.daml     — atomic DvP (propose -> accept -> Settle) + SettlementBatch + receipts.
#   MarketOnClose.daml  — the sealed-order Market-on-Close auction (programmable dark pool).
#   Agent.daml          — delegated / agent-initiated settlement under a mandate limit.
#   Test.daml           — Daml Script scenarios + the `initialize` init-script below.

# `daml start` auto-runs this script after spinning up the local sandbox: it
# allocates the parties, publishes the instruments, and seeds a live DvP proposal
# for the Navigator UI.
init-script: Test:initialize

# Standard-library + scripting deps. All three ship with the SDK — NO external
# daml-finance .dar dependency in the buildable code (that avoids version-pinning
# breakage; see docs/DAML_FINANCE_INTEGRATION.md for the documented library swap).
#   daml-prim / daml-stdlib — the DAML standard library.
#   daml-script             — the Daml.Script module used by Test.daml.
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script

# Compiled DAR output location.
build-options:
  - --output=.daml/dist/canton-dvp-settlement-desk-1.0.0.dar
